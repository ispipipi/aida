<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AidA Maritime Financial Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7faf9;
      --paper: #ffffff;
      --paper-2: #f1f5f4;
      --ink: #10201d;
      --muted: #60706c;
      --line: #dbe6e3;
      --line-2: #c9d8d4;
      --teal: #00bfa8;
      --teal-dark: #008b7e;
      --red: #df3f45;
      --amber: #e49b18;
      --green: #10a66d;
      --blue: #3178d4;
      --violet: #7257d9;
      --gold: #b69113;
      --shadow: 0 20px 60px rgba(16, 32, 29, .10);
      --shadow-soft: 0 10px 30px rgba(16, 32, 29, .07);
      --radius: 10px;
      --mono: "Space Mono", monospace;
      --font: "DM Sans", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
      font-family: var(--font);
      letter-spacing: 0;
      overflow-x: hidden;
    }
    body.modal-open { overflow: hidden; }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; color: inherit; background: transparent; }
    button:hover, a:hover { opacity: .82; }
    button:disabled { opacity: .48; cursor: not-allowed; }
    a { color: var(--teal-dark); text-decoration: none; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
    }
    textarea { min-height: 116px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 4px rgba(0, 191, 168, .13);
    }
    .hidden { display: none !important; }
    .mono { font-family: var(--mono); }
    .muted { color: var(--muted); }
    .container { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
    .btn {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      padding: 0 15px;
      background: var(--paper);
      color: var(--ink);
      font-weight: 800;
      white-space: nowrap;
    }
    .btn.primary { background: var(--ink); color: white; border-color: var(--ink); }
    .btn.teal { background: var(--teal); color: #001d19; border-color: var(--teal); }
    .btn.ghost { color: var(--teal-dark); border-color: rgba(0, 191, 168, .35); background: rgba(0, 191, 168, .07); }
    .btn.danger { color: var(--red); border-color: rgba(223, 63, 69, .35); background: rgba(223, 63, 69, .06); }
    .icon-btn {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      position: relative;
    }
    .badge, .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      background: var(--paper-2);
      color: var(--muted);
      font: 700 11px/1 var(--mono);
      white-space: nowrap;
    }
    .badge.green, .pill.green { color: var(--green); background: rgba(16, 166, 109, .09); border-color: rgba(16, 166, 109, .25); }
    .badge.red, .pill.red { color: var(--red); background: rgba(223, 63, 69, .08); border-color: rgba(223, 63, 69, .25); }
    .badge.amber, .pill.amber { color: var(--amber); background: rgba(228, 155, 24, .10); border-color: rgba(228, 155, 24, .28); }
    .badge.blue, .pill.blue { color: var(--blue); background: rgba(49, 120, 212, .09); border-color: rgba(49, 120, 212, .25); }
    .badge.gold, .pill.gold { color: #5c4700; background: rgba(182, 145, 19, .16); border-color: rgba(182, 145, 19, .32); }
    .dot { width: 8px; height: 8px; border-radius: 99px; background: var(--muted); display: inline-block; }
    .dot.green { background: var(--green); }
    .dot.red { background: var(--red); }
    .dot.amber { background: var(--amber); }
    .dot.blue { background: var(--blue); }
    .pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(223,63,69,.45); } 50% { box-shadow: 0 0 0 8px rgba(223,63,69,0); } }
    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow-soft);
    }
    .panel { padding: 18px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
    .section-title { margin: 0 0 10px; font-size: clamp(30px, 5vw, 54px); line-height: 1; letter-spacing: -.03em; }
    .section-kicker { margin: 0 0 10px; color: var(--teal-dark); font: 700 12px/1 var(--mono); text-transform: uppercase; }
    .field { display: grid; gap: 7px; }
    .field label { color: var(--muted); font: 700 11px/1.2 var(--mono); text-transform: uppercase; }
    .fade { animation: fade .18s ease both; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(247, 250, 249, .85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(219, 230, 227, .86);
    }
    .site-nav .container {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      text-align: left;
    }
    .brand-logo {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: var(--ink);
      color: var(--teal);
      font-weight: 900;
      letter-spacing: -.04em;
    }
    .brand small { display: block; color: var(--muted); font-weight: 700; font-size: 11px; }
    .nav-links { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .nav-links a { color: var(--muted); font-weight: 800; font-size: 14px; }
    .lang-toggle {
      display: inline-flex;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px;
      background: var(--paper);
    }
    .lang-toggle button {
      min-width: 34px;
      height: 28px;
      border-radius: 999px;
      color: var(--muted);
      font: 700 11px/1 var(--mono);
    }
    .lang-toggle button.active { color: #00231f; background: var(--teal); }
    .hero {
      padding: 72px 0 58px;
      background:
        linear-gradient(120deg, rgba(0, 191, 168, .12), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--line);
    }
    .hero-layout {
      display: grid;
      grid-template-columns: minmax(0, .95fr) minmax(360px, 1.05fr);
      gap: 34px;
      align-items: center;
    }
    .hero h1 { margin: 0; max-width: 720px; font-size: clamp(42px, 6vw, 72px); line-height: .96; letter-spacing: -.055em; }
    .hero p { color: var(--muted); font-size: 18px; line-height: 1.55; max-width: 660px; }
    .hero-actions, .chip-row { display: flex; flex-wrap: wrap; align-items: center; gap: 9px; }
    .hero-preview {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--paper);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .preview-top {
      display: flex;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfdfc;
    }
    .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
    .preview-kpi { padding: 14px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--paper-2); }
    .preview-kpi strong { display: block; font-size: 28px; letter-spacing: -.04em; }
    .preview-list { padding: 0 16px 16px; display: grid; gap: 8px; }
    .preview-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; padding: 10px; border: 1px solid var(--line); border-radius: var(--radius); }
    .site-section { padding: 64px 0; }
    .feature-card h3 { margin: 0 0 8px; }
    .feature-card p { margin: 0; color: var(--muted); line-height: 1.45; }
    .flow {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }
    .flow-step { padding: 16px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--paper); }
    .flow-step span { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 99px; background: var(--ink); color: white; font: 700 12px/1 var(--mono); margin-bottom: 10px; }
    footer { padding: 24px 0; border-top: 1px solid var(--line); color: var(--muted); }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .app-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0;
      height: 58px;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 1px 4px rgba(16,32,29,.06);
    }
    .app-nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
      border-right: 1px solid var(--line);
      height: 100%;
    }
    .app-nav-tabs {
      display: flex;
      align-items: stretch;
      height: 100%;
      flex: 1;
      overflow-x: auto;
    }
    .app-nav-tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 20px;
      height: 100%;
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .app-nav-tab:hover { color: var(--ink); }
    .app-nav-tab.active { color: var(--ink); border-bottom-color: var(--teal); }
    .app-nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 100%;
      border-left: 1px solid var(--line);
    }
    .app-stats-bar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-bottom: 1px solid var(--line);
      background: var(--paper);
    }
    .app-stats-bar-item {
      padding: 12px 20px;
      border-right: 1px solid var(--line);
      text-align: center;
    }
    .app-stats-bar-item:last-child { border-right: none; }
    .app-stats-bar-num {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--teal-dark);
    }
    .app-stats-bar-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-top: 2px;
    }
    .app-main { min-width: 0; flex: 1; }
    .mobile-tabs { display: none; }
    .content { padding: 20px; }
    .module-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .module-head h1 { margin: 0 0 6px; font-size: clamp(28px, 4vw, 44px); letter-spacing: -.04em; }
    .module-head p { margin: 0; color: var(--muted); max-width: 760px; line-height: 1.45; }
    .kpi { padding: 16px; }
    .kpi span { color: var(--muted); font: 700 11px/1.2 var(--mono); text-transform: uppercase; }
    .kpi strong { display: block; margin-top: 8px; font-size: 30px; letter-spacing: -.04em; }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .toolbar-left { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .search { max-width: 360px; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); background: var(--paper); }
    table { width: 100%; min-width: 980px; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; vertical-align: middle; }
    th { color: var(--muted); background: #fbfdfc; font: 700 11px/1 var(--mono); text-transform: uppercase; }
    tr.clickable { cursor: pointer; }
    .risk {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 99px;
      color: white;
      font: 700 12px/1 var(--mono);
      background: var(--green);
    }
    .risk.mid { background: var(--amber); }
    .risk.high { background: var(--red); }
    .insight-feed { display: grid; gap: 10px; }
    .insight { padding: 12px; border: 1px solid var(--line); border-left: 4px solid var(--teal); border-radius: var(--radius); background: var(--paper); }
    .insight.red { border-left-color: var(--red); }
    .insight.amber { border-left-color: var(--amber); }
    .bar-chart { display: grid; grid-template-columns: 44px repeat(4, 1fr); gap: 12px; align-items: end; min-height: 220px; padding: 16px; }
    .bar-y { height: 160px; display: flex; flex-direction: column; justify-content: space-between; color: var(--muted); font: 700 10px/1 var(--mono); }
    .bar { height: 160px; display: grid; align-items: end; gap: 8px; text-align: center; color: var(--muted); font: 700 10px/1.2 var(--mono); }
    .bar i { display: block; min-height: 4px; border-radius: 5px 5px 0 0; animation: grow .55s ease both; }
    @keyframes grow { from { transform: scaleY(0); transform-origin: bottom; } to { transform: scaleY(1); transform-origin: bottom; } }
    .heatmap { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .heat-cell { min-height: 74px; display: grid; align-content: center; gap: 4px; padding: 10px; border-radius: var(--radius); background: rgba(0, 191, 168, .10); border: 1px solid var(--line); }
    .heat-cell.hot { background: rgba(223, 63, 69, .11); }
    .heat-cell.warn { background: rgba(228, 155, 24, .13); }
    .app-stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .app-stat {
      min-height: 82px;
      display: grid;
      align-content: center;
      gap: 5px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
    }
    .app-stat span { color: var(--muted); font: 700 10px/1.2 var(--mono); text-transform: uppercase; }
    .app-stat strong { font-size: 24px; letter-spacing: -.03em; }
    .status-dot { display: inline-flex; align-items: center; gap: 7px; }
    .vessel-name { min-width: 170px; }
    .op-badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 999px; font: 700 10px/1 var(--mono); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
    .op-load { background: rgba(16,166,109,.10); color: var(--green); border: 1px solid rgba(16,166,109,.25); }
    .op-disch1 { background: rgba(49,120,212,.09); color: var(--blue); border: 1px solid rgba(49,120,212,.25); }
    .op-disch2 { background: rgba(228,155,24,.10); color: var(--amber); border: 1px solid rgba(228,155,24,.28); }
    .op-generic { background: var(--paper-2); color: var(--muted); border: 1px solid var(--line); }
    .vessel-icon { width: 26px; height: 26px; display: grid; place-items: center; border-radius: 6px; background: rgba(0,191,168,.10); border: 1px solid rgba(0,191,168,.2); font-size: 13px; flex-shrink: 0; }
    .currency-tag { font: 700 10px/1 var(--mono); padding: 3px 8px; border-radius: 999px; background: rgba(0,191,168,.09); color: var(--teal-dark); border: 1px solid rgba(0,191,168,.2); }
    .currency-tag.dzd { background: rgba(228,155,24,.10); color: var(--amber); border-color: rgba(228,155,24,.28); }
    .file-actions { display: flex; gap: 7px; justify-content: flex-end; }
    .modal.wide { width: min(1180px, 100%); }
    .vessel-tabs {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 12px 18px 0;
      border-bottom: 1px solid var(--line);
      background: #fbfdfc;
    }
    .vessel-tabs button {
      flex: 0 0 auto;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-bottom: 0;
      border-radius: var(--radius) var(--radius) 0 0;
      color: var(--muted);
      font-weight: 800;
      background: transparent;
    }
    .vessel-tabs button.active {
      color: var(--ink);
      background: var(--paper);
      border-color: var(--line);
    }
    .mini-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .mini-card {
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper-2);
    }
    .mini-card span { display: block; color: var(--muted); font: 700 10px/1 var(--mono); text-transform: uppercase; }
    .mini-card strong { display: block; margin-top: 6px; }
    .file-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdfc;
      margin-bottom: 12px;
    }
    .voucher-list, .doc-list, .mail-list, .rating-list { display: grid; gap: 9px; }
    .voucher-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius); transition: border-color .15s; }
    .voucher-item:hover { border-color: var(--line-2); }
    .voucher-item.ok { border-left: 3px solid var(--green); }
    .voucher-item.warn { border-left: 3px solid var(--amber); background: rgba(228,155,24,.04); }
    .voucher-item.err { border-left: 3px solid var(--red); background: rgba(223,63,69,.04); }
    .voucher-check { font-size: 18px; flex-shrink: 0; }
    .voucher-info { flex: 1; min-width: 0; }
    .voucher-name { font-size: 13px; font-weight: 600; color: var(--ink); }
    .voucher-meta { font: 700 10px/1.4 var(--mono); color: var(--muted); margin-top: 3px; }
    .voucher-row, .doc-row, .mail-row, .rating-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
    }
    .mail-row { grid-template-columns: auto 1fr auto; }
    .yesno { display: inline-flex; gap: 5px; padding: 4px; border: 1px solid var(--line); border-radius: 999px; background: var(--paper-2); }
    .yesno button {
      min-width: 38px;
      min-height: 28px;
      border-radius: 999px;
      color: var(--muted);
      font: 700 11px/1 var(--mono);
    }
    .yesno button.active { color: white; background: var(--ink); }
    .score-circle {
      width: 104px;
      height: 104px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 9px solid rgba(0, 191, 168, .16);
      background: conic-gradient(var(--teal) 0 72%, var(--line) 72% 100%);
    }
    .score-circle strong {
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--paper);
      font-size: 28px;
    }
    .fx-trend {
      width: 100%;
      height: 150px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #fff, var(--paper-2));
    }
    .alert-banner { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border-radius: var(--radius); border: 1px solid; margin-bottom: 14px; }
    .alert-bad { background: rgba(223,63,69,.06); border-color: rgba(223,63,69,.3); }
    .alert-warn { background: rgba(228,155,24,.07); border-color: rgba(228,155,24,.3); }
    .alert-ok { background: rgba(16,166,109,.07); border-color: rgba(16,166,109,.25); }
    .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
    .alert-title { font: 700 11px/1.2 var(--mono); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
    .at-bad { color: var(--red); }
    .at-warn { color: var(--amber); }
    .at-ok { color: var(--green); }
    .alert-text { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .mini-bench { background: var(--paper-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px; }
    .mini-bench-title { font: 700 9px/1 var(--mono); letter-spacing: .1em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }

      gap: 10px;

    const statusLabel = (s) => t(s);
    const countryFlag = (country) => {
      const flags = {"Spain":"🇪🇸","Algeria":"🇩🇿","Türkiye":"🇹🇷","Turkey":"🇹🇷","Greece":"🇬🇷","Italy":"🇮🇹","Tunisia":"🇹🇳","Portugal":"🇵🇹","Egypt":"🇪🇬","Morocco":"🇲🇦","Romania":"🇷🇴","Ukraine":"🇺🇦"};
      return flags[country] || "🌍";
    };
    const opBadge = (op) => {
      const o = op.toLowerCase();
      if (o.includes("load")) return `<span class="op-badge op-load">Loading</span>`;
      if (o.includes("1st") || (o.includes("discharge") && !o.includes("2nd"))) return `<span class="op-badge op-disch1">1st Discharge</span>`;
      if (o.includes("2nd")) return `<span class="op-badge op-disch2">2nd Discharge</span>`;
      return `<span class="op-badge op-generic">${op}</span>`;
    };
    const statusBadge = (s) => { const color = s==="clean"?"green":s==="disputed"?"red":s==="awaitingPda"?"amber":"blue"; const pulse = s==="disputed" ? " pulse" : ""; return `<span class="badge ${color}"><span class="dot ${color}${pulse}"></span>${statusLabel(s)}</span>`; };
    const scoreColor = (v) => v > 84 ? "var(--green)" : v > 68 ? "var(--teal)" : v > 52 ? "var(--amber)" : "var(--red)";

    function render() {
      document.documentElement.lang = state.lang;
      $("#root").innerHTML = state.screen === "site" ? renderSite() : renderApp();
    }

    function langToggle() {
      return `<div class="lang-toggle"><button class="${state.lang==="es"?"active":""}" data-action="lang" data-lang="es">ES</button><button class="${state.lang==="en"?"active":""}" data-action="lang" data-lang="en">EN</button></div>`;
    }

    function brandButton(action="home") {
      return `<button class="brand" data-action="${action}">
        <span class="brand-logo">Ai</span><span>AidA<small>by NPR Europa</small></span>
      </button>`;
    }

    function renderSite() {
      return `<section>
        <nav class="site-nav"><div class="container">${brandButton("home")}<div class="nav-links">
          <a href="#product">${t("navProduct")}</a><a href="#flow">${t("navFlow")}</a><a href="#pricing">${t("navPricing")}</a><a href="#contact">${t("navContact")}</a>${langToggle()}
          <button class="btn ghost" data-action="toast" data-toast="${t("requestDemo")}">${t("requestDemo")}</button><button class="btn primary" data-action="launch">${t("launch")}</button>
        </div></div></nav>
        <header class="hero"><div class="container hero-layout">
          <div><p class="section-kicker">${t("heroKicker")}</p><h1>${t("heroTitle")}</h1><p>${t("heroText")}</p>
            <div class="hero-actions"><button class="btn primary" data-action="launch">${t("launch")}</button><button class="btn ghost" data-action="newFile">${t("uploadDocs")}</button></div>
            <div class="chip-row" style="margin-top:18px"><span class="pill green">${t("heroBadge1")}</span><span class="pill blue">${t("heroBadge2")}</span><span class="pill amber">${t("heroBadge3")}</span></div>
          </div>
          <div class="hero-preview">
            <div class="preview-top"><strong>${t("previewTitle")}</strong><span class="badge green">Live demo</span></div>
            <div class="preview-grid">
              <div class="preview-kpi"><span>${t("kpi1")}</span><strong>148</strong></div><div class="preview-kpi"><span>${t("kpi2")}</span><strong>€42.8K</strong></div>
              <div class="preview-kpi"><span>${t("kpi3")}</span><strong>7</strong></div><div class="preview-kpi"><span>${t("kpi4")}</span><strong>2.6%</strong></div>
            </div>
            <div class="preview-list">${state.calls.slice(0,3).map(c => `<div class="preview-row"><span><strong>${c.vessel}</strong><br><small class="muted">${c.port} · ${c.agent}</small></span><span class="risk ${riskClass(c.risk)}">${c.risk}</span></div>`).join("")}</div>
          </div>
        </div></header>
        <section id="product" class="site-section"><div class="container"><p class="section-kicker">${t("navProduct")}</p><h2 class="section-title">${t("valueTitle")}</h2><p class="muted" style="max-width:760px">${t("valueText")}</p>
          <div class="grid-4" style="margin-top:22px">${["f1","f2","f3","f4"].map((k,i)=>`<article class="card panel feature-card"><span class="badge ${["green","blue","gold","amber"][i]}">${i+1}</span><h3>${t(k)}</h3><p>${t(k+"t")}</p></article>`).join("")}</div>
        </div></section>
        <section id="flow" class="site-section"><div class="container"><p class="section-kicker">${t("navFlow")}</p><h2 class="section-title">${t("flowTitle")}</h2><div class="flow">${["upload","pre","audit","action","resolution"].map((k,i)=>`<div class="flow-step"><span>${i+1}</span><strong>${t(k)}</strong><p class="muted">${t(k+"T")}</p></div>`).join("")}</div></div></section>
        <section id="pricing" class="site-section"><div class="container card panel"><p class="section-kicker">${t("navPricing")}</p><h2 class="section-title">${t("pricingTitle")}</h2><p class="muted">${t("pricingText")}</p><button class="btn primary" data-action="launch">${t("launch")}</button></div></section>
        <footer id="contact"><div class="container">${t("footer")}</div></footer>
      </section>`;
    }

    function renderApp() {
      const tabs = [["fileboard","▦",s("File Board","File Board")],["dashboard","◌",t("dashboard")],["analytics","◇",t("analytics")],["agents","◎",t("agents")],["tariffs","▤",t("tariffs")],["disputes","✉",t("disputes")]];
      const active = state.calls.filter(c => c.status !== "clean").length;
      const awaiting = state.calls.filter(c => c.status === "awaitingPda").length;
      const fdaIssues = state.calls.filter(c => c.fdaLoaded && c.risk >= 6).length;
      const recovered = state.calls.reduce((s,c)=>s+c.recovered,0);
      const closed = state.calls.filter(c => c.status === "clean").length + 11;
      return `<section class="app">
        <nav class="app-nav">
          <button class="app-nav-brand" data-action="site">${brandButton("site")}</button>
          <div class="app-nav-tabs">${tabs.map(t2 => `<button class="app-nav-tab ${state.tab===t2[0]?"active":""}" data-action="tab" data-tab="${t2[0]}">${t2[1]} ${t2[2]}</button>`).join("")}</div>
          <div class="app-nav-actions">
            ${langToggle()}
            <span class="badge red"><span class="dot red pulse"></span>3</span>
            <strong style="font-size:13px">NPR Europa</strong>
            <button class="btn ghost" data-action="newFile">${t("bulkUpload")}</button>
            <button class="btn primary" data-action="newFile">+ ${t("newFile")}</button>
          </div>
        </nav>
        <div class="app-stats-bar">
          <div class="app-stats-bar-item"><div class="app-stats-bar-num">${active}</div><div class="app-stats-bar-label">${s("Viajes activos","Active voyages")}</div></div>
          <div class="app-stats-bar-item"><div class="app-stats-bar-num" style="color:var(--amber)">${awaiting}</div><div class="app-stats-bar-label">${s("Esperando PDA","Awaiting PDA")}</div></div>
          <div class="app-stats-bar-item"><div class="app-stats-bar-num" style="color:var(--red)">${fdaIssues}</div><div class="app-stats-bar-label">${s("FDA con issues","FDA issues")}</div></div>
          <div class="app-stats-bar-item"><div class="app-stats-bar-num" style="color:var(--green)">$${((recovered+4100)/1000).toFixed(1)}K</div><div class="app-stats-bar-label">${s("Ahorro este mes","Saved this month")}</div></div>
          <div class="app-stats-bar-item"><div class="app-stats-bar-num">${closed}</div><div class="app-stats-bar-label">${s("Cerrados este mes","Closed this month")}</div></div>
        </div>
        <main class="app-main">
          <div class="content fade">${renderTab()}</div>
        </main>
      </section>`;
    }

    function moduleHead(title, text, actions="") {
      return `<div class="module-head"><div><h1>${title}</h1><p>${text}</p></div><div class="chip-row">${actions}</div></div>`;
    }

    function renderTab() {
      return ({ fileboard: renderFileBoard, dashboard: renderDashboard, audit: renderAudit, agents: renderAgents, tariffs: renderTariffs, disputes: renderDisputes, analytics: renderAnalytics })[state.tab]();
    }

    function renderFileBoard() {
      const filterLabels = [
        ["all", s("Todos", "All")],
        ["awaitingPda", s("Esperando PDA", "Awaiting PDA")],
        ["inPort", s("En puerto", "In Port")],
        ["fdaReview", s("FDA Review", "FDA Review")],
        ["closed", s("Cerrados", "Closed")]
      ];
      const visible = state.calls.filter(c => {
        if (state.fileFilter === "awaitingPda") return c.status === "awaitingPda";
        if (state.fileFilter === "fdaReview") return c.fdaStatus && c.fdaStatus.includes("FDA");
        if (state.fileFilter === "closed") return c.status === "clean";
        if (state.fileFilter === "inPort") return c.status !== "clean" && c.status !== "awaitingPda";
        return true;
      });
      return `${appStats()}
        ${moduleHead(s("File Board operativo", "Operational File Board"), s("Expedientes por nave y viaje con PDA, FDA, vouchers, FX, agente y acciones de cierre.", "Vessel and voyage files with PDA, FDA, vouchers, FX, agent and close-out actions."), `<button class="btn ghost" data-action="newFile">${t("uploadDocs")}</button><button class="btn primary" data-action="newFile">+ ${t("newFile")}</button>`)}
        <section class="card panel">
          <div class="toolbar"><div class="toolbar-left"><input class="search" placeholder="${t("globalSearch")}">${filterLabels.map(f=>`<button class="btn ${state.fileFilter===f[0]?"primary":""}" data-action="fileFilter" data-filter="${f[0]}">${f[1]}</button>`).join("")}</div><button class="btn ghost" data-action="toast" data-toast="${t("toastExport")}">${t("export")}</button></div>
          <div class="table-wrap"><table><thead><tr><th>${t("vessel")}</th><th>${t("voyage")}</th><th>${s("Operación","Operation")}</th><th>${t("port")}</th><th>ETA/ATA</th><th>ETD/ATD</th><th>${s("Moneda","Currency")}</th><th>${t("pda")}</th><th>${t("fda")}</th><th>${t("status")}</th><th>${s("Acciones","Actions")}</th></tr></thead><tbody>
            ${visible.map(c => `<tr class="clickable" data-action="vessel" data-id="${c.id}">
              <td class="vessel-name"><div style="display:flex;align-items:center;gap:8px"><div class="vessel-icon">🚢</div><div><strong>${c.vessel}</strong><br><small class="muted">${c.agent}</small></div></div></td><td class="mono" style="font-size:11px;color:var(--teal-dark)">${c.voyage}</td><td>${opBadge(c.operation)}</td><td>${countryFlag(c.country)} <span style="color:var(--muted);font-size:13px">${c.port}</span></td><td style="font-size:12px">${c.eta}</td><td style="font-size:12px">${c.etd}</td><td><span class="currency-tag ${c.currency==='DZD'?'dzd':''}">${c.currency}</span></td>
              <td>${statusPill(c.pdaStatus, c.pdaLoaded ? "green" : "amber")}</td><td>${statusPill(c.fdaStatus, c.fdaLoaded ? (c.risk > 6 ? "red" : "green") : "amber")}</td><td>${statusBadge(c.status)}</td>
              <td><div class="file-actions"><button class="btn ghost" data-action="vessel" data-id="${c.id}">${t("open")}</button></div></td>
            </tr>`).join("")}
          </tbody></table></div>
        </section>`;
    }

    function appStats() {
      const active = state.calls.filter(c => c.status !== "clean").length;
      const awaiting = state.calls.filter(c => c.status === "awaitingPda").length;
      const fdaIssues = state.calls.filter(c => c.fdaLoaded && c.risk >= 6).length;
      const closed = state.calls.filter(c => c.status === "clean").length + 11;
      return `<div class="app-stats">
        ${appStat(s("Viajes activos","Active voyages"), active)}
        ${appStat(s("Esperando PDA","Awaiting PDA"), awaiting)}
        ${appStat(s("FDA con issues","FDA issues"), fdaIssues)}
        ${appStat(s("Ahorro este mes","Saved this month"), "$4.2K")}
        ${appStat(s("Cerrados este mes","Closed this month"), closed)}
      </div>`;
    }

    function appStat(label, value) {
      return `<div class="app-stat"><span>${label}</span><strong>${value}</strong></div>`;
    }

    function statusPill(label, color="blue") {
      return `<span class="badge ${color}">${label || "N/A"}</span>`;
    }

    function renderDashboard() {
      const active = state.calls.filter(c => c.status !== "clean").length;
      const recovered = state.calls.reduce((s,c)=>s+c.recovered,0);
      return `${moduleHead(t("dashTitle"), t("dashText"), `<button class="btn ghost" data-action="newFile">${t("uploadDocs")}</button><button class="btn primary" data-action="tab" data-tab="audit">${t("open")} PDA/FDA</button>`)}
      <div class="grid-4">
        ${kpi(t("kpi1"), "148", "+18%")}
        ${kpi(t("activeAlerts"), active, "7 high")}
        ${kpi(t("kpi2"), `€${(recovered+42100).toLocaleString()}`, "+€3,240")}
        ${kpi(t("kpi4"), "2.6%", "vs PDA")}
      </div>
      <div class="grid-2" style="margin-top:14px">
        <section class="card panel"><h3>${t("activeAlerts")}</h3><div class="insight-feed">${state.calls.filter(c=>c.risk>=5).map(c=>`<div class="insight ${c.risk>=8?"red":"amber"}"><strong>${c.vessel} · ${c.port}</strong><p class="muted">${c.issues[0]}</p><button class="btn ghost" data-action="detail" data-id="${c.id}">${t("open")}</button></div>`).join("")}</div></section>
        <section class="card panel"><h3>${t("savingsTrend")}</h3>${barChart([740, 920, 1280, 3240], ["Feb","Mar","Apr","May"], ["var(--teal)","var(--blue)","var(--amber)","var(--green)"], "€")}<div class="chip-row"><button class="btn" data-action="toast" data-toast="${t("toastExport")}">${t("export")}</button><button class="btn ghost" data-action="newFile">${t("simulate")}</button></div></section>
      </div>`;
    }

    function kpi(label, value, hint) {
      return `<div class="card kpi"><span>${label}</span><strong>${value}</strong><small class="muted">${hint}</small></div>`;
    }

    function renderAudit() {
      return `${moduleHead(t("auditTitle"), t("auditText"), `<button class="btn ghost" data-action="newFile">${t("uploadDocs")}</button><button class="btn primary" data-action="newFile">${t("newFile")}</button>`)}
        <div class="toolbar"><div class="toolbar-left"><input class="search" id="auditSearch" placeholder="${t("globalSearch")}"><button class="btn" data-action="filter" data-filter="all">${t("open")}</button><button class="btn" data-action="filter" data-filter="risk">High risk</button></div></div>
        <div class="table-wrap"><table><thead><tr><th>${t("vessel")}</th><th>${t("voyage")}</th><th>${t("port")}</th><th>${t("agent")}</th><th>${t("pda")}</th><th>${t("fda")}</th><th>${t("variance")}</th><th>${t("fx")}</th><th>${t("funds")}</th><th>${t("risk")}</th><th>${t("status")}</th><th></th></tr></thead><tbody>
          ${state.calls.map(c => `<tr class="clickable" data-action="detail" data-id="${c.id}"><td><strong>${c.vessel}</strong></td><td class="mono">${c.voyage}</td><td>${c.port}</td><td>${c.agent}</td><td>${money(c.pda,c.currency)}</td><td>${money(c.fda,c.currency)}</td><td>${c.variance==null?"—":c.variance+"%"}</td><td>${c.fx.includes("risk")?`<span class="badge gold">${c.fx}</span>`:`<span class="badge green">${c.fx}</span>`}</td><td>${money(c.funds,"USD")}</td><td><span class="risk ${riskClass(c.risk)}">${c.risk}</span></td><td>${statusBadge(c.status)}</td><td><button class="btn ghost">${t("viewDetail")}</button></td></tr>`).join("")}
        </tbody></table></div>`;
    }

    function renderAgents() {
      const own = agents.filter(a => a.preferred);
      const best = [...agents].sort((a,b)=>b.score-a.score).slice(0,3);
      return `${moduleHead(t("agentsTitle"), t("agentsText"), `<select id="countrySelect">${["Spain","Algeria","Greece","Italy","Portugal"].map(c=>`<option ${state.selectedCountry===c?"selected":""}>${c}</option>`).join("")}</select><button class="btn ghost" data-action="toast" data-toast="${t("toastExport")}">${t("export")}</button>`)}
        <div class="grid-2"><section class="card panel"><h3>${t("preferred")}</h3>${agentCards(own)}</section><section class="card panel"><h3>${t("networkBest")}</h3>${agentCards(best)}</section></div>`;
    }

    function agentCards(list) {
      return `<div class="insight-feed">${list.map(a=>`<div class="card panel" style="box-shadow:none;border-left:4px solid ${scoreColor(a.score)}"><div class="toolbar"><div><strong>${a.name}</strong><p class="muted">${a.port}, ${a.country} · ${a.note}</p></div><span class="risk ${riskClass(10-a.score/10)}" style="background:${scoreColor(a.score)}">${a.score}</span></div>
        ${scoreLine("Accuracy", a.accuracy)}${scoreLine("Response", Math.max(20,100-parseFloat(a.response)*4))}<div class="chip-row"><span class="badge amber">${a.fee}</span><button class="btn ghost" data-action="agentProfile" data-agent="${a.name}">${t("profile")}</button><button class="btn" data-action="toast" data-toast="${t("compare")}">${t("compare")}</button></div></div>`).join("")}</div>`;
    }

    function scoreLine(label, value) {
      return `<div class="score-line"><div><div class="muted">${label}</div><div class="score-track"><div class="score-fill" style="width:${value}%;background:${scoreColor(value)}"></div></div></div><strong class="mono">${Math.round(value)}</strong></div>`;
    }

    function renderTariffs() {
      const rows = tariffs.filter(x => x.port === state.tariffPort);
      const total = rows.reduce((s,r)=>s+r.avg,0);
      return `${moduleHead(t("tariffsTitle"), t("tariffsText"), `<select id="tariffPort">${[...new Set(tariffs.map(x=>x.port))].map(p=>`<option ${state.tariffPort===p?"selected":""}>${p}</option>`).join("")}</select><button class="btn primary" data-action="simulateTariff">${t("simulatePda")}</button>`)}
      <div class="grid-2"><section class="card panel"><h3>${state.tariffPort}</h3><div class="table-wrap"><table><thead><tr><th>Item</th><th>${t("low")}</th><th>${t("avg")}</th><th>${t("high")}</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.item}</td><td>${money(r.low)}</td><td><strong>${money(r.avg)}</strong></td><td>${money(r.high)}</td></tr>`).join("")}</tbody></table></div></section>
      <section class="card panel"><h3>${t("simulatePda")}</h3><div class="grid-2"><div class="field"><label>${t("cargoType")}</label><select><option>Bulk Wheat</option><option>Break Bulk</option><option>Tanker</option></select></div><div class="field"><label>${t("tonnage")}</label><input value="28,500 MT"></div></div><button class="btn primary" style="margin-top:12px" data-action="simulateTariff">${t("estimate")}</button><div id="tariffResult" class="insight green" style="margin-top:12px"><strong>${t("avg")} PDA</strong><p class="muted">${money(total || 12200)} · Confidence 82%</p></div></section></div>`;
    }

    function renderDisputes() {
      return `${moduleHead(t("disputesTitle"), t("disputesText"), `<button class="btn primary" data-action="draft">${t("autoDraft")}</button>`)}
      <div class="grid-3">${disputeThreads.map(d=>`<section class="card panel"><span class="badge ${d.status==="Recovered"?"green":d.status==="Sent"?"blue":"amber"}"><span class="dot ${d.status==="Recovered"?"green":d.status==="Sent"?"blue":"amber"}"></span>${d.status}</span><h3>${d.id}</h3><p class="muted">${d.call}<br>${d.type}</p><strong>${t("recovered")}: €${d.impact.toLocaleString()}</strong><div class="chip-row" style="margin-top:12px"><button class="btn ghost" data-action="draft">${t("autoDraft")}</button><button class="btn" data-action="toast" data-toast="${t("trace")}">${t("trace")}</button></div></section>`).join("")}</div>
      <section class="card panel" style="margin-top:14px"><h3>${t("autoDraft")}</h3><textarea>Dear Agent,\n\nAidA has identified discrepancies linked to voyage VY-2025-041. Please provide supporting invoices or issue a revised FDA / credit note.\n\nBest regards,\nNPR Europa Disbursements Desk</textarea><button class="btn primary" data-action="draft">${t("sendDraft")}</button></section>`;
    }

    function renderAnalytics() {
      return `${moduleHead(t("analyticsTitle"), t("analyticsText"), `<button class="btn ghost" data-action="toast" data-toast="${t("toastExport")}">${t("downloadReport")}</button>`)}
      <div class="grid-2"><section class="card panel"><h3>${t("heatmap")}</h3><div class="heatmap">${["Valencia","Annaba","Ravenna","Sines","Iskenderun","Thessaloniki","Algiers","Tunis","Constanta","Bilbao"].map((p,i)=>`<div class="heat-cell ${i===1||i===6?"hot":i===2||i===7?"warn":""}"><strong>${p}</strong><span class="muted">${(1.2+i*.7).toFixed(1)}% var</span></div>`).join("")}</div></section>
      <section class="card panel"><h3>${t("roi")}</h3>${barChart([2400, 5200, 9600, 18400], ["Q1","Q2","Q3","Q4"], ["var(--blue)","var(--teal)","var(--amber)","var(--green)"], "€")}<div class="grid-2"><div class="kpi card"><span>${t("roi")}</span><strong>6.8x</strong></div><div class="kpi card"><span>${t("supplierRank")}</span><strong>Hellenic #1</strong></div></div></section></div>`;
    }

    function barChart(values, labels, colors, prefix="") {
      const max = Math.max(...values) * 1.16;
      return `<div class="bar-chart"><div class="bar-y"><span>${prefix}${Math.round(max).toLocaleString()}</span><span>${prefix}${Math.round(max/2).toLocaleString()}</span><span>0</span></div>${values.map((v,i)=>`<div class="bar"><i style="height:${Math.max(4,(v/max)*160)}px;background:${colors[i]}"></i><small>${labels[i]}<br>${Number(v).toLocaleString()}</small></div>`).join("")}</div>`;
    }

    function openVesselModal(id) {
      const c = state.calls.find(x=>x.id===id);
      state.selectedCall = c;
      state.vesselTab = state.vesselTab || "nomination";
      $("#modal").className = "modal wide";
      $("#modal").innerHTML = renderVesselModal(c);
      $("#modalLayer").classList.add("open");
      document.body.classList.add("modal-open");
    }

    function renderVesselModal(c) {
      const tabs = [
        ["nomination", s("Nomination","Nomination")],
        ["pda", "PDA"],
        ["compare", "PDA vs FDA"],
        ["vouchers", "Vouchers"],
        ["fx", "FX Check"],
        ["mail", "Mail & Docs"],
        ["rating", s("Rate Agent","Rate Agent")]
      ];
      return `<div class="modal-head"><div><strong>${c.vessel}</strong><div class="muted">${c.voyage} · ${c.operation} · ${c.port}</div></div><button class="icon-btn" data-action="close">×</button></div>
        <nav class="vessel-tabs">${tabs.map(tab=>`<button class="${state.vesselTab===tab[0]?"active":""}" data-action="vtab" data-tab="${tab[0]}">${tab[1]}</button>`).join("")}</nav>

          <textarea style="margin-top:12px">Dear ${agent.name},\n\nPlease confirm your nomination for ${c.vessel} / ${c.voyage} at ${c.port}. Kindly send PDA with tariff support and expected voucher pack.</textarea>

        <div class="drop-zone" data-action="runPdaOcr" style="cursor:pointer">
          <div style="font-size:28px;margin-bottom:10px">🔍</div>
          <strong>DROP PDA HERE OR CLICK TO UPLOAD</strong>
          <p class="muted" style="margin-top:6px">PDF or Excel · AidA OCR extracts all line items and compares agency fee against port benchmarks</p>
          <div class="progress hidden" style="margin-top:12px"><i></i></div>
          <span class="muted mono" id="ocrLabel" style="display:block;margin-top:8px;font-size:11px"></span>

        <div class="ocr-result-bar">OCR COMPLETE — Proforma DA · ${c.vessel} · ${c.port} · ${money(c.pda,c.currency)} · ${feeOver?"1 flag raised":"Clean"}</div>
        ${feeOver ? `<div class="alert-banner alert-warn">
          <div class="alert-icon">⚠️</div>
          <div><div class="alert-title at-warn">Agency Fee Alert — ${Math.round((agentFee.pda/agentFee.avg-1)*100)}% Above Network Benchmark</div>
          <div class="alert-text">PDA agency fee <strong>${money(agentFee.pda,c.currency)}</strong> is significantly above the AidA network average for ${c.port} (<strong>${money(agentFee.avg,c.currency)}</strong>, 47 port calls). Query recommended before approving.</div></div>
        </div>
        <div class="mini-bench">
          <div class="mini-bench-title">Agency Fee Benchmark — ${c.port} · 47 AidA-network port calls</div>
          <div class="mini-bar-row"><div class="mini-bar-lbl">Network avg</div><div class="mini-bar-track"><div class="mini-bar-fill mbf-ref" style="width:58%">${money(agentFee.avg,c.currency)}</div></div></div>
          <div class="mini-bar-row"><div class="mini-bar-lbl" style="color:var(--amber)">This PDA</div><div class="mini-bar-track"><div class="mini-bar-fill mbf-cur" style="width:73%">${money(agentFee.pda,c.currency)} ↑${Math.round((agentFee.pda/agentFee.avg-1)*100)}%</div></div></div>
        </div>` : `<div class="alert-banner alert-ok"><div class="alert-icon">✅</div><div><div class="alert-title at-ok">PDA Within Expected Range</div><div class="alert-text">All charges verified against AidA network benchmarks for ${c.port}. No anomalies detected.</div></div></div>`}
        <div style="margin-bottom:14px">${fileBar("PDA_"+c.voyage+".pdf", c.pdaStatus, "runPdaOcr")}</div>
        <div class="table-wrap" style="margin-bottom:14px"><table><thead><tr><th>Item</th><th>Amount (${c.currency})</th><th>vs Benchmark</th><th>AidA Flag</th></tr></thead><tbody>
          ${charges.map(x=>`<tr style="${x.pda>x.avg?"background:rgba(228,155,24,.04)":""}"><td style="${x.pda>x.avg?"color:var(--amber)":""}">${x.item}</td><td class="mono" style="${x.pda>x.avg?"color:var(--amber)":""}">${money(x.pda,c.currency)}</td><td class="${x.pda>x.avg?"diff-bad":"diff-ok"}">${x.pda>x.avg?`+${Math.round((x.pda/x.avg-1)*100)}% above avg`:"Within range"}</td><td>${statusPill(x.pda>x.avg?"Review":"OK",x.pda>x.avg?"amber":"green")}</td></tr>`).join("")}
          <tr style="border-top:2px solid var(--line)"><td><strong>TOTAL</strong></td><td class="mono"><strong>${money(c.pda,c.currency)}</strong></td><td class="${charges.some(x=>x.pda>x.avg)?"diff-warn":"diff-ok"}">${charges.filter(x=>x.pda>x.avg).length} item(s) flagged</td><td>—</td></tr>
        </tbody></table></div>
        <div class="chip-row" style="margin-bottom:14px">
          <button class="btn primary" data-action="approvePda">✓ Approve PDA</button>
          <button class="btn danger" data-action="queryAgent">Query Agent on Fees</button>
        </div>

Re: ${c.vessel} - ${c.port} - ${c.voyage} - Proforma DA

We have reviewed the PDA and note that the agency fee of ${money(agentFee.pda,c.currency)} is significantly above the market average for ${c.port} (${money(agentFee.avg,c.currency)} network average, 47 port calls).

Could you please provide justification or revert with a revised figure?

Best regards, NPR Europa</textarea>

        </div>` : ""}

    function renderComparison(c) {
      if (!c.fdaLoaded) return `<section class="card panel">
        <h3>Upload Final DA — OCR Reader</h3>
        <p class="muted" style="margin-bottom:14px">Drop the FDA here. AidA OCR extracts all lines and auto-compares against approved PDA — discrepancies highlighted instantly.</p>
        <div class="drop-zone" data-action="runFdaOcr" style="cursor:pointer">
          <div style="font-size:28px;margin-bottom:10px">🔍</div>
          <strong>DROP FINAL DA HERE OR CLICK TO UPLOAD</strong>
          <p class="muted" style="margin-top:6px">PDF or Excel · AidA OCR extracts all lines and auto-compares against approved PDA</p>
          <div class="progress hidden" style="margin-top:12px"><i></i></div>
          <span class="muted mono" id="ocrLabel" style="display:block;margin-top:8px;font-size:11px"></span>
        </div>
      </section>`;
      const variance = (c.fda||0) - (c.pda||0);
      const disputed = charges.filter(x=>x.fda>x.pda).length;
      return `<div>
        <div class="ocr-result-bar">OCR COMPLETE — Final DA · ${c.vessel} · ${c.port} · ${money(c.fda,c.currency)} · ${disputed} discrepanc${disputed===1?"y":"ies"} vs PDA</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px">
          ${[["PDA Total",money(c.pda,c.currency),"var(--ink)"],["FDA Total",money(c.fda,c.currency),variance>0?"var(--amber)":"var(--green)"],["Unexplained Variance",money(variance,c.currency),variance>0?"var(--red)":"var(--green)"],["Items Disputed",disputed+" of "+charges.length,disputed>0?"var(--red)":"var(--green)"]].map(([label,val,col])=>`<div style="background:var(--paper-2);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px"><div style="font:700 9px/1 var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">${label}</div><div style="font:700 14px/1 var(--mono);color:${col}">${val}</div></div>`).join("")}
        </div>
        ${variance > 0 ? `<div class="alert-banner alert-bad">
          <div class="alert-icon">🔴</div>
          <div><div class="alert-title at-bad">${disputed} Discrepanc${disputed===1?"y":"ies"} vs Approved PDA — Total Variance ${money(variance,c.currency)}</div>
          <div class="alert-text">${c.issues.slice(0,2).join(". ")}.</div></div>
        </div>` : `<div class="alert-banner alert-ok"><div class="alert-icon">✅</div><div><div class="alert-title at-ok">FDA Matches PDA — No Discrepancies</div><div class="alert-text">All line items verified. Safe to approve and process payment.</div></div></div>`}
        <div class="table-wrap" style="margin-bottom:14px"><table><thead><tr><th>Item</th><th>PDA (${c.currency})</th><th>FDA (${c.currency})</th><th>Δ</th><th>Status</th></tr></thead><tbody>
          ${charges.map(x=>`<tr style="${x.fda>x.pda?"background:rgba(223,63,69,.04)":""}"><td style="${x.fda>x.pda?"color:var(--red)":""}">${x.item}</td><td class="mono" style="color:var(--muted)">${money(x.pda,c.currency)}</td><td class="mono" style="${x.fda>x.pda?"color:var(--red)":""}">${money(x.fda,c.currency)}</td><td class="${x.fda>x.pda?"diff-bad":"diff-ok"}">${x.fda>x.pda?"+"+money(x.fda-x.pda,c.currency):"—"}</td><td>${statusPill(x.fda>x.pda?"Disputed":"Match",x.fda>x.pda?"red":"green")}</td></tr>`).join("")}
          <tr style="border-top:2px solid var(--line)"><td><strong>TOTAL</strong></td><td class="mono" style="color:var(--muted);font-weight:700">${money(c.pda,c.currency)}</td><td class="mono" style="font-weight:700">${money(c.fda,c.currency)}</td><td class="${variance>0?"diff-bad":"diff-ok"}" style="font-weight:700">${variance>0?"+"+money(variance,c.currency):"—"}</td><td>—</td></tr>
        </tbody></table></div>
        ${variance > 0 ? `<div class="query-box">
          <div class="query-label">✉ Send Query to Agent</div>
          <textarea style="width:100%;min-height:110px;border:1px solid var(--line);border-radius:var(--radius);padding:10px;font:12px/1.5 var(--mono);color:var(--ink);background:var(--paper)">Dear ${c.agent},

Re: ${c.vessel} - ${c.port} - ${c.voyage} - Final DA

We have reviewed the FDA and note ${disputed} discrepanc${disputed===1?"y":"ies"} vs the approved PDA totalling ${money(variance,c.currency)}:

${charges.filter(x=>x.fda>x.pda).map(x=>`- ${x.item}: PDA ${money(x.pda,c.currency)} → FDA ${money(x.fda,c.currency)} (+${money(x.fda-x.pda,c.currency)}). Please provide supporting voucher.`).join("\\n")}

Please revert with documentation. Payment will be processed upon resolution.

Best regards, NPR Europa</textarea>
          <div class="chip-row" style="margin-top:10px">
            <button class="btn danger" data-action="queryAgent">Send Query →</button>
            <button class="btn ghost" data-action="payUndisputed">Pay Undisputed (${money(c.pda,c.currency)})</button>
            <button class="btn primary" disabled style="opacity:.4">Approve FDA (blocked — ${disputed} dispute${disputed===1?"":"s"} open)</button>
          </div>
        </div>` : `<div class="chip-row"><button class="btn primary" data-action="approve">✓ Approve & Process Payment</button></div>`}
      </div>`;
    }

    function renderVouchers(c) {
      const names = ["Agency invoice","Pilotage receipt","Towage receipt","Port dues","Mooring voucher","Launch boat","Garbage receipt","Final SOF"];
      const metas = ["Agent fee invoice","PIL receipt","Towage company receipt","Port authority receipt","Mooring company receipt","Launch service receipt","Waste reception cert","Statement of Facts"];
      const received = c.vouchers.filter(v => v === true).length;
      const mismatches = c.vouchers.filter(v => v === "mismatch").length;
      const missing = c.vouchers.filter(v => v === false).length;
      const blocked = missing > 0 || mismatches > 0;
      return `<div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <span class="badge green">✓ ${received} received</span>
          ${mismatches > 0 ? `<span class="badge amber">⚠ ${mismatches} mismatch</span>` : ""}
          ${missing > 0 ? `<span class="badge red">✗ ${missing} missing</span>` : ""}
        </div>
        ${blocked ? `<div class="alert-banner alert-bad" style="margin-bottom:14px">
          <div class="alert-icon">🔴</div>
          <div><div class="alert-title at-bad">FDA Cannot Be Approved — Incomplete Voucher Pack</div>
          <div class="alert-text">AidA blocks clean approval until all missing vouchers are received and amount mismatches are resolved or justified.</div></div>
        </div>` : `<div class="alert-banner alert-ok" style="margin-bottom:14px"><div class="alert-icon">✅</div><div><div class="alert-title at-ok">Complete Voucher Pack — Safe to Approve</div><div class="alert-text">All expected vouchers received and amounts verified against FDA line items.</div></div></div>`}
        <div class="grid-2">
          <section class="card panel">
            <h3>Document Checklist <span class="muted" style="font-weight:400;font-size:13px">${received}/8 received</span></h3>
            <div class="voucher-list">${names.map((name, i) => {
              const v = c.vouchers[i];
              const cls = v === true ? "ok" : v === "mismatch" ? "warn" : "err";
              const icon = v === true ? "✓" : v === "mismatch" ? "⚠" : "✗";
              const iconColor = v === true ? "var(--green)" : v === "mismatch" ? "var(--amber)" : "var(--red)";
              const label = v === true ? "Verified" : v === "mismatch" ? "Amount mismatch — review required" : "Missing — request from agent";
              return `<div class="voucher-item ${cls}">
                <div class="voucher-info"><div class="voucher-name">${name}</div><div class="voucher-meta">${metas[i]} · ${label}</div></div>
                <div style="display:flex;align-items:center;gap:8px">
                  <span class="voucher-check" style="color:${iconColor}">${icon}</span>
                  ${v !== true ? `<button class="btn ghost" style="font-size:11px;padding:4px 10px" data-action="requestVoucher">Request</button>` : `<button class="btn" style="font-size:11px;padding:4px 10px" data-action="toast" data-toast="Viewing voucher">View</button>`}
                </div>
              </div>`;
            }).join("")}</div>
          </section>
          <section class="card panel">
            <h3>Actions</h3>
            ${blocked ? `<div class="query-box" style="margin-bottom:14px">
              <div class="query-label">✉ Request Missing Vouchers</div>
              <textarea style="width:100%;min-height:90px;border:1px solid var(--line);border-radius:var(--radius);padding:10px;font:12px/1.5 var(--mono);color:var(--ink);background:var(--paper)">Dear ${c.agent},\n\nRe: ${c.vessel} / ${c.voyage} — Voucher Pack\n\nWe are missing the following documents:\n${names.filter((n,i) => c.vouchers[i] !== true).map(n => "- "+n).join("\n")}\n\nPlease provide at your earliest convenience.\n\nBest regards, NPR Europa</textarea>
              <div class="chip-row" style="margin-top:10px">
                <button class="btn primary" data-action="requestVoucher">Send Request →</button>
                <button class="btn ghost" data-action="toast" data-toast="Exception registered">Justify Exception</button>
              </div>
            </div>
            <button class="btn" disabled style="opacity:.4;width:100%">Approve FDA (blocked — resolve voucher issues first)</button>` :
            `<button class="btn primary" style="width:100%;margin-bottom:10px" data-action="approve">✓ Approve FDA & Process Payment</button>
            <button class="btn ghost" style="width:100%" data-action="toast" data-toast="Report generated">Download Voucher Report</button>`}
          </section>
        </div>
      </div>`;
    }

        [c.agent,"PDA received with tariff backup", "1h"],
        ["AidA","Agency fee variance flagged", "12m"]
      ].map(m=>`<div class="mail-row"><span class="badge blue">${m[0]}</span><span><strong>${m[1]}</strong><br><small class="muted">${c.vessel} · ${c.voyage}</small></span><small class="muted">${m[2]}</small></div>`).join("")}</div></section>
      <section class="card panel"><h3>${s("Documentos","Documents")}</h3><div class="doc-list">${docs.map((d,i)=>`<div class="doc-row"><span><strong>${d}</strong><br><small class="muted">${i<3?s("Validado por OCR","OCR validated"):s("Pendiente de revisión","Pending review")}</small></span>${statusPill(i<3?"OK":s("Review","Review"),i<3?"green":"amber")}</div>`).join("")}</div><button class="btn primary" style="margin-top:12px" data-action="docUpload">${t("uploadDocs")}</button></section></div>`;
    }

    function renderRating(c) {
      const labels = [s("Precisión documental","Document accuracy"),s("Rapidez de respuesta","Response speed"),s("Competitividad de coste","Cost competitiveness"),s("Calidad operativa","Operational quality"),s("Transparencia FX","FX transparency"),s("Resolución de disputas","Dispute resolution")];
      const avg = Math.round((state.rating6.reduce((a,b)=>a+b,0) || 18) / 30 * 100);
      return `<div class="grid-2"><section class="card panel"><h3>${t("rateAgent")}</h3><div class="rating-list">${labels.map((label,i)=>`<div class="rating-row"><span>${label}</span><span>${[1,2,3,4,5].map(n=>`<button class="star ${state.rating6[i]>=n?"on":""}" data-action="vesselStar" data-row="${i}" data-star="${n}">★</button>`).join("")}</span></div>`).join("")}</div>
        <div class="grid-2" style="margin-top:12px">${[s("¿Enviar a red AidA?","Send to AidA network?"),s("¿Bloquear como preferido?","Block as preferred?"),s("¿Requiere revisión?","Needs review?"),s("¿Compartir benchmark?","Share benchmark?")].map((label,i)=>`<div class="voucher-row"><span>${label}</span><span class="yesno"><button class="${i===2?"active":""}">${t("yes")}</button><button class="${i!==2?"active":""}">${t("no")}</button></span></div>`).join("")}</div>
        <textarea style="margin-top:12px">${agents.find(a=>a.name===c.agent)?.note || ""}</textarea><button class="btn primary" data-action="submitRating">${s("Guardar evaluación","Save rating")}</button></section>
        <section class="card panel"><h3>${s("Score vivo","Live score")}</h3><div class="toolbar"><div class="score-circle"><strong>${avg}</strong></div><div><strong>${c.agent}</strong><p class="muted">${s("El score actualiza ranking, nominaciones futuras y alertas por país/puerto.", "The score updates ranking, future nominations and country/port alerts.")}</p></div></div>${scoreLine("Cost", Math.max(20, 100-c.risk*7))}${scoreLine("Service", avg)}${scoreLine("Compliance", c.fx.includes("risk")?42:88)}</section></div>`;
    }

    function mini(label, value) {
      return `<div class="mini-card"><span>${label}</span><strong>${value}</strong></div>`;
    }

    function fileBar(name, status, action) {
      return `<div class="file-bar"><span><strong>${name}</strong><br><small class="muted">${status}</small></span><button class="btn ghost" data-action="${action}">${s("Reprocesar OCR","Re-run OCR")}</button></div>`;
    }

    function openCallDetail(id) {
      const c = state.calls.find(x=>x.id===id);
      state.selectedCall = c;
      $("#drawer").innerHTML = `<div class="drawer-head"><div><strong>${t("detail")} · ${c.vessel}</strong><div class="muted">${c.voyage} · ${c.port} · ${c.agent}</div></div><button class="icon-btn" data-action="close">×</button></div>
      <div class="drawer-body">
        <div class="grid-3">
          <section class="card panel"><h3>${t("financialSummary")}</h3>${kpi(t("pda"), money(c.pda,c.currency), "PDA")}${kpi(t("fda"), money(c.fda,c.currency), "FDA")}${kpi(t("variance"), c.variance==null?"—":c.variance+"%", "vs PDA")}<div class="insight ${c.fx.includes("risk")?"red":"green"}"><strong>FX Analysis</strong><p class="muted">${c.fx.includes("risk")?"Agent rate 128.40 DZD/USD vs official 134.75. Hidden spread estimated at USD 1,240.":"No FX risk detected for this call."}</p></div></section>
          <section class="card panel"><h3>${t("charges")}</h3><div class="table-wrap"><table><thead><tr><th>Item</th><th>PDA</th><th>FDA</th><th>Avg</th><th>OCR</th></tr></thead><tbody>${charges.map(x=>`<tr><td>${x.item}</td><td>${money(x.pda)}</td><td>${money(x.fda)}</td><td>${money(x.avg)}</td><td>${x.conf}%</td></tr>`).join("")}</tbody></table></div></section>
          <section class="card panel"><h3>${t("insights")}</h3><div class="insight-feed">${c.issues.map((i,idx)=>`<div class="insight ${idx===0&&c.risk>=8?"red":"amber"}"><strong>${i}</strong><p class="muted">AidA confidence ${idx?82:94}%</p></div>`).join("")}</div><div class="chip-row" style="margin-top:12px"><button class="btn primary" data-action="approve">${t("approveClean")}</button><button class="btn danger" data-action="draft">${t("draftDispute")}</button><button class="btn ghost" data-action="voucher">${t("requestVoucher")}</button></div></section>
        </div>
        <div class="grid-2" style="margin-top:14px"><section class="card panel"><h3>${t("fundsRegistry")}</h3><div class="table-wrap"><table><thead><tr><th>Date</th><th>Amount</th><th>Ref</th></tr></thead><tbody><tr><td>2025-06-13</td><td>${money(c.funds,"USD")}</td><td>WIRE-${c.voyage.slice(-3)}</td></tr><tr><td>2025-06-17</td><td>${money(2400,"USD")}</td><td>PENDING</td></tr></tbody></table></div></section>
        <section class="card panel"><h3>${t("rateAgent")}</h3>${[0,1,2].map(i=>`<div class="toolbar"><span>${["Service","Communication","Competitiveness"][i]}</span><span>${[1,2,3,4,5].map(n=>`<button class="star ${state.rating[i]>=n?"on":""}" data-action="star" data-row="${i}" data-star="${n}">★</button>`).join("")}</span></div>`).join("")}<textarea placeholder="Notes">${agents.find(a=>a.name===c.agent)?.note || ""}</textarea><button class="btn primary" data-action="toast" data-toast="${t("rateAgent")} OK">${t("rateAgent")}</button></section></div>
      </div>`;
      $("#drawerLayer").classList.add("open");
      document.body.classList.add("modal-open");
    }

    function openNewFile() {
      state.uploadStep = 0;
      $("#modal").className = "modal";
      $("#modal").innerHTML = `<div class="modal-head"><div><strong>${t("newFile")}</strong><div class="muted">${t("step1")}</div></div><button class="icon-btn" data-action="close">×</button></div><div class="modal-body" id="newFileBody">${uploadBody()}</div>`;
      $("#modalLayer").classList.add("open");
      document.body.classList.add("modal-open");
    }

    function uploadBody(done=false) {
      if (!done) return `<div class="drop-zone" data-action="startOcr"><strong>${t("dropText")}</strong><div class="progress hidden"><i></i></div><span class="muted mono" id="ocrLabel"></span></div>`;
      return `<h3>${t("step2")}</h3><div class="grid-2">${[["Vessel","PACIFIC HORN"],["Voyage","VY-2025-047"],["Loading Port","Constanta"],["1st Discharge","Algiers"],["2nd Discharge","Tunis"],["Cargo","Bulk Wheat"]].map(f=>`<div class="field"><label>${f[0]}</label><input value="${f[1]}"></div>`).join("")}</div><div class="chip-row" style="margin-top:14px"><button class="btn primary" data-action="createFiles">${t("createFiles")}</button></div>`;
    }

    function showToast(message) {
      const el = document.createElement("div");
      el.className = "toast";
      el.textContent = message;
      const stack = $("#toasts");
      while (stack.children.length >= 3) stack.firstElementChild.remove();
      stack.appendChild(el);
      setTimeout(()=>el.remove(), 3500);
    }

    function closeOverlays() {
      $("#drawerLayer").classList.remove("open");
      $("#modalLayer").classList.remove("open");
      $("#modal").className = "modal";
      document.body.classList.remove("modal-open");
    }

    function startOcr(zone) {
      const steps = [t("loading"), t("ocr1"), t("ocr2"), t("ocr3"), t("complete")];
      const bar = $(".progress", zone), fill = $(".progress i", zone), label = $("#ocrLabel");
      bar.classList.remove("hidden");
      let i = 0;
      const tick = () => {
        label.textContent = steps[i];
        fill.style.width = `${(i+1)*20}%`;
        i++;
        if (i < steps.length) setTimeout(tick, 520);
        else setTimeout(()=>{ $("#newFileBody").innerHTML = uploadBody(true); showToast(t("toastUpload")); }, 350);
      };
      tick();
    }

    function runFileOcr(zone, kind) {
      const steps = kind === "pda" ? [s("Leyendo PDA…","Reading PDA…"), s("Extrayendo cargos…","Extracting charges…"), s("Comparando benchmark…","Comparing benchmark…"), t("complete")] : [s("Leyendo FDA…","Reading FDA…"), s("Comparando contra PDA…","Comparing against PDA…"), s("Detectando diferencias…","Detecting differences…"), t("complete")];
      const bar = $(".progress", zone), fill = $(".progress i", zone), label = $("#ocrLabel");
      if (bar) bar.classList.remove("hidden");
      let i = 0;
      const tick = () => {
        if (label) label.textContent = steps[i];
        if (fill) fill.style.width = `${((i+1)/steps.length)*100}%`;
        i++;
        if (i < steps.length) setTimeout(tick, 500);
        else setTimeout(()=>{
          if (state.selectedCall) {
            if (kind === "pda") {
              state.selectedCall.pdaLoaded = true;
              state.selectedCall.pda = state.selectedCall.pda || 15400;
              state.selectedCall.pdaStatus = "PDA review";
              state.selectedCall.status = "inReview";
            } else {
              state.selectedCall.fdaLoaded = true;
              state.selectedCall.fda = state.selectedCall.fda || Math.round((state.selectedCall.pda || 15400) * 1.027);
              state.selectedCall.fdaStatus = state.selectedCall.risk > 6 ? "FDA issue" : "FDA review";
            }
            $("#modal").innerHTML = renderVesselModal(state.selectedCall);
          }
          showToast(t("toastUpload"));
        }, 300);
      };
      tick();
    }

    document.addEventListener("click", (e) => {
      const target = e.target.closest("[data-action]");
      if (!target) return;
      const action = target.dataset.action;
      if (action === "lang") { state.lang = target.dataset.lang; render(); showToast(t("toastLang")); return; }
      if (action === "launch") { state.screen = "app"; state.tab = "fileboard"; render(); showToast(t("toastLaunch")); return; }
      if (action === "site" || action === "home") { state.screen = "site"; closeOverlays(); render(); return; }
      if (action === "tab") { state.tab = target.dataset.tab; render(); return; }
      if (action === "fileFilter") { state.fileFilter = target.dataset.filter; render(); return; }
      if (action === "vessel") { openVesselModal(target.dataset.id); return; }
      if (action === "vtab") { state.vesselTab = target.dataset.tab; if (state.selectedCall) $("#modal").innerHTML = renderVesselModal(state.selectedCall); return; }
      if (action === "detail") { openCallDetail(target.dataset.id); return; }
      if (action === "close") { closeOverlays(); return; }
      if (action === "newFile") { openNewFile(); return; }
      if (action === "startOcr") { startOcr(target); return; }
      if (action === "runPdaOcr") { runFileOcr(target.closest(".drop-zone") || target.closest(".file-bar") || target, "pda"); return; }
      if (action === "runFdaOcr") { runFileOcr(target.closest(".drop-zone") || target, "fda"); return; }
      if (action === "createFiles") {
        state.calls.push({ id:"PACIFIC_HORN_A", vessel:"PACIFIC HORN", voyage:"VY-2025-047", operation:"Bulk wheat load", port:"Constanta", country:"Romania", agent:"Pending", eta:"2025-07-02", etd:"2025-07-04", pda:null, fda:null, variance:null, fx:"N/A", funds:0, risk:5, status:"awaitingPda", pdaStatus:"Awaiting PDA", fdaStatus:"Not started", currency:"EUR", pdaLoaded:false, fdaLoaded:false, vouchers:[false,false,false,false,false,false,false,false], issues:["PDA not received"], recovered:0 });
        state.calls.push({ id:"PACIFIC_HORN_B", vessel:"PACIFIC HORN", voyage:"VY-2025-047", operation:"Bulk wheat discharge", port:"Algiers", country:"Algeria", agent:"Pending", eta:"2025-07-08", etd:"2025-07-11", pda:null, fda:null, variance:null, fx:"DZD risk", funds:0, risk:8, status:"awaitingPda", pdaStatus:"Awaiting PDA", fdaStatus:"Not started", currency:"DZD", pdaLoaded:false, fdaLoaded:false, vouchers:[false,false,false,false,false,false,false,false], issues:["Local currency FX risk"], recovered:0 });
        state.calls.push({ id:"PACIFIC_HORN_C", vessel:"PACIFIC HORN", voyage:"VY-2025-047", operation:"Bulk wheat discharge", port:"Tunis", country:"Tunisia", agent:"Pending", eta:"2025-07-12", etd:"2025-07-14", pda:null, fda:null, variance:null, fx:"N/A", funds:0, risk:6, status:"awaitingPda", pdaStatus:"Awaiting PDA", fdaStatus:"Not started", currency:"EUR", pdaLoaded:false, fdaLoaded:false, vouchers:[false,false,false,false,false,false,false,false], issues:["Agent nomination pending"], recovered:0 });
        closeOverlays(); state.tab = "fileboard"; render(); showToast(t("toastCreated")); return;
      }
      if (action === "approve") { if (state.selectedCall) state.selectedCall.status = "clean"; closeOverlays(); render(); showToast(t("toastApproved")); return; }
      if (action === "approvePda") { if (state.selectedCall) { state.selectedCall.pdaStatus = "PDA approved"; $("#modal").innerHTML = renderVesselModal(state.selectedCall); } showToast(t("toastApproved")); return; }
      if (action === "queryAgent") { showToast(t("toastDraft")); return; }
      if (action === "payUndisputed") { showToast(s("Pago no disputado marcado para aprobación.", "Undisputed payment marked for approval.")); return; }
      if (action === "sendNomination") { showToast(s("Nominación preparada para revisión humana.", "Nomination prepared for human review.")); return; }
      if (action === "requestVoucher") { showToast(t("toastVoucher")); return; }
      if (action === "docUpload") { showToast(t("toastUpload")); return; }
      if (action === "submitRating") { showToast(s("Evaluación guardada. Score del agente actualizado.", "Rating saved. Agent score updated.")); return; }
      if (action === "draft") { showToast(t("toastDraft")); return; }
      if (action === "voucher") { showToast(t("toastVoucher")); return; }
      if (action === "toast") { showToast(target.dataset.toast || "OK"); return; }
      if (action === "agentProfile") { const a = agents.find(x=>x.name===target.dataset.agent); showToast(`${a.name}: ${a.note}`); return; }
      if (action === "simulateTariff") { showToast(`${t("simulatePda")}: ${money(12200)} · confidence 82%`); return; }
      if (action === "star") { state.rating[Number(target.dataset.row)] = Number(target.dataset.star); if (state.selectedCall) openCallDetail(state.selectedCall.id); return; }
      if (action === "vesselStar") { state.rating6[Number(target.dataset.row)] = Number(target.dataset.star); if (state.selectedCall) $("#modal").innerHTML = renderVesselModal(state.selectedCall); return; }
    });

    document.addEventListener("change", (e) => {
      if (e.target.id === "tariffPort") { state.tariffPort = e.target.value; render(); }
      if (e.target.id === "countrySelect") { state.selectedCountry = e.target.value; render(); }
    });

    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeOverlays(); });
    render();
  </script>
</body>
</html>
